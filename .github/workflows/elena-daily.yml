name: Elena Daily Editorial

on:
  schedule:
    - cron: '30 13 * * *'  # 13:30 UTC daily — after major European/Asian news cycles land
  workflow_dispatch:

jobs:
  elena_editorial:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      models: read  # GitHub Models access via GITHUB_TOKEN

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Elena editorial pipeline
        env:
          # Primary: frontier model via GitHub Models (GPT-5 / Llama-405B).
          # GITHUB_TOKEN has models:read via the job permission above; a dedicated
          # GITHUB_MODELS_TOKEN PAT overrides if set (useful for higher rate limits).
          GITHUB_MODELS_TOKEN:  ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          # Fallbacks
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/elena-daily.mjs

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          mkdir -p public/hero public/audio ops/telemetry

          git add src/content/posts/ public/hero/ public/audio/ ops/provider-health.json ops/telemetry/ || true

          if ! git diff-index --quiet HEAD; then
            git commit -m "editorial: Elena's daily column"
            git push
          else
            echo "No editorial change to commit."
          fi
