name: Automated ETL Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch: # Allow manual trigger

# One run at a time. If a long run is still going when the next cron fires,
# the new run waits rather than racing on processed_urls.json / git push.
concurrency:
  group: automated-etl
  cancel-in-progress: false

jobs:
  ingest_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ETL Pipeline
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TRANSLATE_ENABLED:    ${{ vars.TRANSLATE_ENABLED }}
        run: node scripts/ingest.js

      - name: Guard against oversized assets
        # Hard stop for files that would break Cloudflare Pages' 25 MiB
        # per-file deploy limit. Catches any slip-through from the TTS or
        # image pipelines before we commit, instead of after deploy fails.
        run: |
          OVERSIZED=$(find public -type f -size +24M 2>/dev/null || true)
          if [ -n "$OVERSIZED" ]; then
            echo "::error::Files exceed Cloudflare Pages 25 MiB per-file limit:"
            echo "$OVERSIZED" | xargs -I{} ls -lh {}
            exit 1
          fi

      - name: Run Prompt Eval (post-run)
        # Reads the day's telemetry to compute per-prompt-variant quality
        # metrics and diff against the previous report. Non-fatal — never
        # blocks publishing.
        if: always()
        run: node scripts/eval-prompts.js || true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Autostash handles modified tracked files (e.g. processed_urls.json) during rebase
          git pull --rebase --autostash origin main

          # Ensure optional output dirs exist so git-add never fails on missing pathspec
          mkdir -p public/hero public/audio ops/telemetry ops/eval src/content/posts-i18n

          # Check whether any public-facing content changed. CF Pages only
          # inspects the HEAD commit message for skip markers, so we combine
          # content + ops into ONE commit whenever content exists, and use a
          # standalone [CI Skip] commit only for ops-only runs. This stops
          # burning CF Pages' monthly build budget on no-op telemetry bumps.
          git add src/content/posts/ src/content/posts-i18n/ public/hero/ public/audio/ || true
          CONTENT_CHANGED=0
          if ! git diff-index --quiet --cached HEAD; then
            CONTENT_CHANGED=1
          fi
          git add processed_urls.json ops/provider-health.json ops/telemetry/ ops/eval/ ops/dlq.jsonl || true

          if [ "$CONTENT_CHANGED" = "1" ]; then
            git commit -m "chore: automated content ingestion"
            git push
          elif ! git diff-index --quiet --cached HEAD; then
            git commit -m "chore: ops telemetry [CI Skip]"
            git push
          else
            echo "Nothing to commit."
          fi

      - name: Freshness healthcheck (live site vs main)
        # Fails loudly (red check on GitHub) if the live site is measurably
        # behind main. 45-min tolerance absorbs normal CF Pages build time;
        # anything longer is a real stall worth investigating.
        if: always()
        run: node scripts/check-freshness.mjs
