name: Automated ETL Pipeline

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ETL Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/ingest.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Autostash handles modified tracked files (e.g. processed_urls.json) during rebase
          git pull --rebase --autostash origin main

          git add src/content/posts/ processed_urls.json ops/provider-health.json || true

          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated content ingestion"
            git push
          else
            echo "No new articles to commit."
          fi
