name: Automated ETL Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch: # Allow manual trigger

# One run at a time. If a long run is still going when the next cron fires,
# the new run waits rather than racing on processed_urls.json / git push.
concurrency:
  group: automated-etl
  cancel-in-progress: false

jobs:
  ingest_and_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ETL Pipeline
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TRANSLATE_ENABLED:    ${{ vars.TRANSLATE_ENABLED }}
        run: node scripts/ingest.js

      - name: Run Prompt Eval (post-run)
        # Reads the day's telemetry to compute per-prompt-variant quality
        # metrics and diff against the previous report. Non-fatal — never
        # blocks publishing.
        if: always()
        run: node scripts/eval-prompts.js || true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Autostash handles modified tracked files (e.g. processed_urls.json) during rebase
          git pull --rebase --autostash origin main

          # Ensure optional output dirs exist so git-add never fails on missing pathspec
          mkdir -p public/hero public/audio ops/telemetry ops/eval src/content/posts-i18n

          git add src/content/posts/ src/content/posts-i18n/ public/hero/ public/audio/ processed_urls.json ops/provider-health.json ops/telemetry/ ops/eval/ ops/dlq.jsonl || true

          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated content ingestion"
            git push
          else
            echo "No new articles to commit."
          fi
