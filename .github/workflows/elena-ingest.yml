name: Elena Doc Ingest

on:
  schedule:
    - cron: '15 * * * *'  # hourly at :15 — picks up new docs soon after Elena drops them
  workflow_dispatch:

jobs:
  elena_ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Elena Drive ingest
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ELENA_DRIVE_FOLDER_ID:       ${{ secrets.ELENA_DRIVE_FOLDER_ID }}
          PEXELS_API_KEY:              ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/elena-ingest.mjs

      - name: Guard against oversized assets
        run: |
          OVERSIZED=$(find public -type f -size +24M 2>/dev/null || true)
          if [ -n "$OVERSIZED" ]; then
            echo "::error::Files exceed Cloudflare Pages 25 MiB per-file limit:"
            echo "$OVERSIZED" | xargs -I{} ls -lh {}
            exit 1
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin main

          mkdir -p public/hero ops

          # Combine content + ops into a single commit when content changed
          # so CF Pages sees the build-triggering message at HEAD. Standalone
          # [CI Skip] commit for ops-only no-op runs (the common case).
          git add src/content/posts/ public/hero/ || true
          CONTENT_CHANGED=0
          if ! git diff-index --quiet --cached HEAD; then
            CONTENT_CHANGED=1
          fi
          git add ops/elena-docs.json || true

          if [ "$CONTENT_CHANGED" = "1" ]; then
            git commit -m "editorial: ingest Elena's latest column"
            git push
          elif ! git diff-index --quiet --cached HEAD; then
            git commit -m "chore: elena ingest state [CI Skip]"
            git push
          else
            echo "Nothing to commit."
          fi

      - name: Freshness healthcheck (live site vs main)
        if: always()
        run: node scripts/check-freshness.mjs
